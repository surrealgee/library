<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>My Library</h1>
    </header>

    <main>
        <table>
            <thead>
                <th>Author</th>
                <th>Title</th>
                <th>Pages</th>
                <th>Read</th>
                <th>Edit</th>
            </thead>
            <tbody id="book-list"></tbody>
        </table>

        <button id="new-book-btn" class="btn">New Book</button>        
    </main>

    <div class="form-modal" id="form-modal">
        <button class="close-modal-btn" id="close-modal-btn">X</button>
        <form action="#" id="form-el">
            <label for="author">Author:</label>
            <input type="text" name="author" id="author" placeholder="Author Name">
            <label for="title">Title:</label>
            <input type="text" name="title" id="title" placeholder="Book Title">
            <label for="pages">Pages:</label>
            <input type="number" name="pages" id="pages" placeholder="Number of pages">
            <label for="isRead">Read:</label>
            <input type="text" name="isRead" id="isRead" placeholder="Have you read it?">
            <button type="submit" class="btn" id="add-book-btn">Add Book</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>

</html>
